packages:
  - 'services/*'
  - 'packages/*'
  - 'apps/*'
  - 'apps/games/*'
  - 'apps/tools/*'
  - 'scripts'
  - 'docs/*'
  - 'tools/*'
  - '!.context/*'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
